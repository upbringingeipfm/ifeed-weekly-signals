<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="iFeed">
  <defs>
    <linearGradient id="ifg" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0d2127"/>
      <stop offset="100%" stop-color="#1f7c8a"/>
    </linearGradient>
  </defs>
  <!-- Light off-white tile · no border · matches light theme bg -->
  <circle cx="32" cy="32" r="31" fill="#f1f4f6"/>
  <!-- 5 ascending signal bars · gradient from deep midnight (bottom) to Monsoon teal (top) -->
  <g fill="url(#ifg)">
    <rect x="14" y="38" width="6" height="12" rx="1"/>
    <rect x="22" y="32" width="6" height="18" rx="1"/>
    <rect x="30" y="26" width="6" height="24" rx="1"/>
    <rect x="38" y="20" width="6" height="30" rx="1"/>
    <rect x="46" y="14" width="6" height="36" rx="1"/>
  </g>
  <!-- Output signal dot · top-right · white fill with dark outline for maximum visual punch -->
  <circle cx="49" cy="14" r="3.6" fill="#ffffff" stroke="#0d2127" stroke-width="1.5"/>
</svg>
